version: "3.8"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: athena_secret
      POSTGRES_DB: athena_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena -d athena_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://athena:athena_secret@postgres:5432/athena_db
      CHROMA_PERSIST_DIR: /app/data/chroma
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Streamlit Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
