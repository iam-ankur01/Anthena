name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: athena
          POSTGRES_PASSWORD: athena_secret
          POSTGRES_DB: athena_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite  # For test DB

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check backend/ tests/ evaluation/

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          OPENAI_API_KEY: "sk-test-fake-key-for-ci"
          CHROMA_PERSIST_DIR: "./test_chroma"
        run: |
          pytest tests/ -v --tb=short -x

      - name: Build Docker image (smoke test)
        run: |
          docker build --target backend -t athena-backend:test .
